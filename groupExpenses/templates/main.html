<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Group Expenses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; color: #0f172a; }
    a { color: #6366f1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .message { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
    .message.info { background: #f8fafc; border: 1px solid #cbd5e1; color: #475569; }
    .message.success { background: #dcfce7; border: 1px solid #22c55e; color: #166534; }
    .message.error { background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; }
    .message.warning { background: #ffedd5; border: 1px solid #f97316; color: #c2410c; }
  </style>
</head>
<body>
  {% if user.is_authenticated %}
  <div style="background:white;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;justify-content:flex-end;align-items:center;gap:12px;font-size:13px;color:#64748b;">
    <span>{{ user.username }}</span>
    <a href="{% url 'logout' %}" style="color:#ef4444;font-weight:600;">Cerrar sesión</a>
  </div>
  {% endif %}
  {% if messages %}
  <div style="max-width:720px;margin:16px auto 0;padding:0 16px;">
    {% for message in messages %}
    <div class="message {{ message.tags }}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
