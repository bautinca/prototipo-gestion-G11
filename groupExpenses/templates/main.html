<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Group Expenses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  {% if messages %}
  <div style="max-width:680px;margin:16px auto 0;padding:0 16px;">
    {% for message in messages %}
    <div style="background:#e74c3c;color:white;padding:10px 16px;border-radius:6px;margin-bottom:8px;font-size:14px;">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}

  {% endblock %}
</body>

</html>
